# Sentinel-Site monitored sources.
# Toggle with enabled; prefer rss_url when known. id is stable (Megatron tags src:<id>).

sources:
  - id: zdi-advisories
    name: Zero Day Initiative Advisories
    home_url: https://www.zerodayinitiative.com/advisories/published/
    collect_mode: html_llm
    tags: [advisory]
    enabled: true
    notes: "/rss/ returns HTML; use discover/heuristic on published list"

  - id: mixbytes-blog
    name: MixBytes Blog
    home_url: https://mixbytes.io/blog
    collect_mode: html_llm
    tags: [blog]
    enabled: true

  - id: ibm-xforce
    name: IBM Security Intelligence X-Force
    home_url: https://www.ibm.com/think/x-force
    allowed_hosts: [ibm.com, www.ibm.com]
    collect_mode: browser_llm
    tags: [blog, vendor]
    enabled: true
    ssl_verify: false
    browser_fallback: true
    access_status: intermittent
    access_issue: historical_proxy_tls; direct HTTP 200 and TLS verification passed in the latest check
    access_tested_at: "2026-07-14"
    access_tested_via: local_proxy_127.0.0.1:7890
    notes: "Legacy securityintelligence.com URL redirects here; browser fallback retained for intermittent TLS/proxy issues"

  - id: unknowncheats-ac
    name: UnknownCheats Anti-Cheat
    home_url: https://www.unknowncheats.me/forum/general-programming-and-reversing/
