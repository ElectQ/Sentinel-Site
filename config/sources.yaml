    collect_mode: browser_llm
    tags: [forum]
    enabled: true
    browser_fallback: true
    access_status: browser_required
    access_issue: direct_http_403; Playwright list and thread content validated
    access_tested_at: "2026-07-14"
    access_tested_via: local_proxy_127.0.0.1:7890
    notes: "General Programming and Reversing board; strip volatile vBulletin session query; Playwright + LLM"

